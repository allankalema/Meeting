<!doctype html>
<html>
<body style="margin:0;padding:24px;background:#F8F9FB;font-family:Arial,sans-serif;color:#1F2937;">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;margin:0 auto;background:#ffffff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;">
    <tr><td style="background:#17458F;padding:18px 24px;"><img src="{{ email_logo_url }}" alt="Kampala Early Bird logo" style="max-width:280px;width:100%;height:auto;display:block;"></td></tr>
    <tr><td style="padding:24px;">
      <h2 style="margin:0 0 12px 0;color:#17458F;">Event Registration Open</h2>
      <p style="margin:0 0 10px 0;"><strong>{{ custom_form.title }}</strong></p>
      <p style="margin:0 0 16px 0;">{{ custom_form.description }}</p>
      <a href="{{ form_url }}" style="display:inline-block;background:#F7A81B;color:#fff;text-decoration:none;font-weight:700;padding:10px 16px;border-radius:10px;">Open Form</a>
    </td></tr>
  </table>
</body>
</html>

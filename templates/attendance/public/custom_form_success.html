{% extends "attendance/base.html" %}
{% load static %}
{% block title %}Submission Complete{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl">
    <div class="card p-7 text-center">
        <img src="{% static 'logo.jpg' %}" alt="logo" class="mx-auto h-14 w-14 rounded-full border border-rotary-blue/20 object-cover">
        <div class="mx-auto mt-4 flex h-12 w-12 items-center justify-center rounded-full bg-rotary-gold/15 text-rotary-blue">
            <svg viewBox="0 0 24 24" class="h-7 w-7" fill="none" stroke="currentColor" stroke-width="2.2">
                <path d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="mt-4 text-2xl font-bold text-[#1F2937]">Thank you for your submission</h1>
        <p class="mt-2 text-sm text-gray-600">Your response for <strong>{{ custom_form.title }}</strong> has been received successfully.</p>
    </div>
</section>
{% endblock %}
